<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SalesPilot AI Widget Demo</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }
      main {
        max-width: 860px;
        margin: 0 auto;
        padding: 72px 24px;
      }
      section {
        border: 1px solid #e2e8f0;
        border-radius: 18px;
        background: #ffffff;
        padding: 28px;
        box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
      }
      h1 {
        margin: 0 0 12px;
        font-size: 30px;
      }
      p {
        line-height: 1.8;
        color: #475569;
      }
      code {
        border-radius: 8px;
        background: #f1f5f9;
        padding: 3px 6px;
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <h1>SalesPilot AI 嵌入式客服测试页</h1>
        <p>
          这是一个仅用于本地开发验证的宿主页面。启动 SalesPilot AI 前端
          <code>http://127.0.0.1:5176</code> 后，页面右下角应显示悬浮客服按钮。
        </p>
        <p>
          如需测试左侧模式，把脚本里的 <code>data-position="right"</code> 改为
          <code>data-position="left"</code>。
        </p>
      </section>
    </main>

    <script
      src="http://127.0.0.1:5176/widget.js"
      data-api-base="http://127.0.0.1:5176"
      data-position="right"
      data-allowed-domains="127.0.0.1,localhost"
    ></script>
  </body>
</html>
