services:
  backend:
    build:
      context: ./backend
    container_name: salespilot-ai-backend
    environment:
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      DATABASE_URL: ${DATABASE_URL:-sqlite:////data/salespilot.db}
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Shanghai}
    volumes:
      - salespilot_data:/data
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ""
    container_name: salespilot-ai-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"
    restart: unless-stopped

volumes:
  salespilot_data:
