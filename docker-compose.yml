services:
  backend:
    build:
      context: ./backend
    container_name: salespilot-ai-backend
    environment:
      AI_PROVIDER: ${AI_PROVIDER:-deepseek}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-}
      AI_MODEL: ${AI_MODEL:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      QWEN_API_KEY: ${QWEN_API_KEY:-}
      QWEN_BASE_URL: ${QWEN_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      QWEN_MODEL: ${QWEN_MODEL:-qwen-plus}
      ZHIPU_API_KEY: ${ZHIPU_API_KEY:-}
      ZHIPU_BASE_URL: ${ZHIPU_BASE_URL:-https://open.bigmodel.cn/api/paas/v4}
      ZHIPU_MODEL: ${ZHIPU_MODEL:-glm-4-flash}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://localhost:11434/v1}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:7b}
      VOLCENGINE_ARK_API_KEY: ${VOLCENGINE_ARK_API_KEY:-}
      VOLCENGINE_ARK_BASE_URL: ${VOLCENGINE_ARK_BASE_URL:-https://ark.cn-beijing.volces.com/api/v3}
      VOLCENGINE_ARK_MODEL: ${VOLCENGINE_ARK_MODEL:-}
      DATABASE_URL: ${DATABASE_URL:-sqlite:////data/salespilot.db}
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Shanghai}
      TZ: ${TZ:-Asia/Shanghai}
      UPLOAD_DIR: ${UPLOAD_DIR:-storage/uploads}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-10}
    volumes:
      - salespilot_data:/data
      - salespilot_uploads:/app/storage/uploads
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ""
    container_name: salespilot-ai-frontend
    depends_on:
      - backend
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    restart: unless-stopped

volumes:
  salespilot_data:
  salespilot_uploads:
